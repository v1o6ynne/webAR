<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>WebAR — Brain Model</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
</head>
<body>
  <div id="app">
    <main class="page">
      <header class="header">
        <h1>WebAR</h1>
        <p class="tagline">View the brain model in AR</p>
      </header>
      <section class="ar-section">
        <p class="ar-hint">Tap "View in AR" to place the model in your space (iOS: Quick Look; Android: Scene Viewer).</p>
        <div class="model-viewer-wrap">
          <model-viewer
            id="model-viewer"
            src="whole_brain_optimized.glb"
            ar
            ar-modes="webxr quick-look"
            camera-controls
            touch-action="pan-y"
            shadow-intensity="1"
            environment-image="neutral"
            exposure="1"
            style="width:100%;height:70vh;min-height:300px;"
          >
            <button slot="ar-button" class="ar-button">View in AR</button>
          </model-viewer>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
